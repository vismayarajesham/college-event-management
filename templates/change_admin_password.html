<!DOCTYPE html>
<html>
<head>
    <title>Change Admin Password</title>
    <link rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>Change Admin Password</h1>

<form method="POST">

    <label>Old Password</label>
    <br>
    <input type="password"
           name="old_password"
           required>
    <br><br>

    <label>New Password</label>
    <br>
    <input type="password"
           name="new_password"
           required>
    <br><br>

    <label>Confirm New Password</label>
    <br>
    <input type="password"
           name="confirm_password"
           required>
    <br><br>

    <button type="submit">
        Change Password
    </button>

</form>
<a href="/admin_dashboard" class="home">&#x2302;</a>
</body>
</html>
