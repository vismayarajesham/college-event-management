<!DOCTYPE html>
<html>
<head>
    <title>Student Signup</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="login-section">

    <h2>Student Signup</h2>

    <form method="POST">

        <input type="text"
               name="student_name"
               placeholder="Name"
               required>

        <br><br>

        <input type="email"
               name="email"
               placeholder="Email"
               required>

        <br><br>

        <input type="password"
               name="password"
               placeholder="Password"
               required>

        <br><br>

        <button type="submit">
            Sign Up
        </button>

        <br><br>

        <p>
            Already have an account?
            <a href="/login">Login</a>
        </p>

    </form>

</div>
<a href="/" class="back-arrow">&#x2302;</a>
</body>
</html>
