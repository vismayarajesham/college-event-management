<!DOCTYPE html>
<html>
<head>
    <title>Student Login</title>
    <link rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>Student Login</h1>

<form action="/login" method="POST">

    <input type="email"
           name="email"
           placeholder="Email"
           required>

    <br><br>

    <input type="password"
           name="password"
           placeholder="Password"
           required>

    <br><br>

    <button type="submit">
        Login
    </button>

</form>
<a href="/" class="back-arrow">&#x2302;</a>
</body>
</html>
